<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Weight Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Weight" />
<meta name="theme-color" content="#0F1218" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Barlow+Semi+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&family=Nunito:wght@400;600;700;800&display=swap');
:root{
  --bg:#0F1218; --bg2:#141922; --card:#1A2029; --card2:#212836;
  --line:#2A3340; --line2:#333E4E;
  --text:#EDF1F7; --muted:#8791A3; --faint:#5A6474;
  --accent:#F5B544; --accent-dim:rgba(245,181,68,.14);
  --good:#5CD6A0; --bad:#F26D5B; --reg:#7C93F5;
  --on-accent:#20160A; --on-good:#0C1A14;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif;
  --mono:ui-monospace,'SF Mono','Cascadia Code',Menlo,Consolas,monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);
  -webkit-font-smoothing:antialiased;min-height:100dvh;}
button{-webkit-user-select:none;user-select:none;font-family:var(--sans);cursor:pointer;}
.wl-shell{max-width:720px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;
  padding-bottom:calc(80px + env(safe-area-inset-bottom,0px));}
.wl-header{display:flex;align-items:flex-end;justify-content:space-between;
  padding:calc(20px + env(safe-area-inset-top,0px)) 20px 14px;position:sticky;top:0;
  background:linear-gradient(var(--bg),var(--bg) 78%,transparent);z-index:5;}
.wl-eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:700;}
.wl-avatar{width:38px;height:38px;border-radius:50%;background:var(--accent);color:#fff;border:2px solid transparent;font-weight:700;font-size:15px;font-family:var(--sans);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;padding:0;}
.wl-avatar.on{border-color:var(--text);}
.wl-req{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;background:var(--bad);color:#fff;padding:3px 7px;border-radius:6px;margin-left:8px;vertical-align:middle;}
.wl-confirm{position:fixed;inset:0;background:rgba(0,0,0,.62);display:flex;align-items:center;justify-content:center;z-index:2000;padding:24px;}
.wl-confirm-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;max-width:360px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.wl-confirm-msg{font-size:15px;line-height:1.5;margin-bottom:18px;color:var(--text);}
.wl-confirm-btns{display:flex;gap:10px;}
.wl-goalrow{margin:12px 0;}
.wl-goalrow-top{display:flex;justify-content:space-between;align-items:baseline;font-size:14px;margin-bottom:5px;}
.wl-goalrow-val{color:var(--faint);font-weight:700;font-size:13px;}
.wl-goalrow-val.done{color:var(--good);}
.wl-goalbar{height:7px;background:var(--bg2);border-radius:4px;overflow:hidden;}
.wl-goalbar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .3s;}
.wl-goalbar-fill.done{background:var(--good);}
.wl-sess{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--line);}
.wl-sess:last-of-type{border-bottom:none;}
.wl-sess-main{flex:1;text-align:left;background:none;border:none;color:inherit;padding:0;cursor:pointer;display:flex;flex-direction:column;gap:3px;font-family:var(--sans);}
.wl-sess-type{font-weight:600;font-size:15px;}
.wl-sess-meta{font-size:12.5px;color:var(--faint);}
.wl-cardioform{margin-top:12px;padding-top:14px;border-top:1px solid var(--line);}
.wl-cf-label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);font-weight:600;margin:0 0 8px;}
.wl-mtag{padding:7px 12px;border-radius:14px;font-size:12px;font-weight:700;border:1.5px solid var(--mc);background:transparent;color:var(--text);letter-spacing:.02em;display:inline-flex;align-items:center;gap:5px;}
.wl-mtag.on{background:var(--mc);color:#fff;border-color:var(--mc);}
.wl-mtag-bars{letter-spacing:-2px;font-size:11px;opacity:.9;}
.wl-chip-ic{display:inline-flex;justify-content:center;align-items:center;width:14px;flex:none;font-size:12px;}
.wl-note{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:rgba(180,150,60,.18);border:1px solid rgba(180,150,60,.35);border-radius:8px;padding:9px 12px;margin-top:6px;color:#d8c68a;font-family:var(--sans);font-size:13.5px;cursor:pointer;}
.wl-note-txt{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.wl-note-pin{flex:none;font-size:12px;}
.wl-note-add{background:none;border:1px dashed var(--line);color:var(--faint);border-radius:8px;padding:7px 12px;margin-top:6px;font-size:13px;cursor:pointer;font-family:var(--sans);}
.wl-note-editor{margin-top:8px;padding:12px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;}
.wl-noteinput{width:100%;box-sizing:border-box;background:var(--card);border:1px solid var(--line);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:14px;padding:10px 12px;outline:none;}
.wl-stepper{display:inline-flex;align-items:center;gap:0;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
.wl-stepper button{background:var(--bg2);border:none;color:var(--text);font-size:20px;width:42px;height:38px;cursor:pointer;line-height:1;}
.wl-stepper button:active{background:var(--accent);color:#fff;}
.wl-stepper span{min-width:40px;text-align:center;font-weight:700;font-size:16px;}
.wl-ri-actions{display:inline-flex;gap:2px;}
.wl-inprogress{display:flex;align-items:center;justify-content:space-between;width:100%;background:rgba(94,234,140,.12);border:1px solid var(--good);border-radius:12px;padding:13px 14px;margin-bottom:10px;color:var(--text);font-family:var(--sans);font-size:15px;font-weight:600;cursor:pointer;}
.wl-ip-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--good);margin-right:9px;vertical-align:middle;animation:wlpulse 1.4s ease-in-out infinite;}
@keyframes wlpulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.wl-ip-badge{font-size:12.5px;font-weight:700;color:var(--good);}
.wl-timerbar{position:sticky;top:calc(var(--headh,64px) - 2px);z-index:4;display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--card);border:1px solid var(--accent);border-radius:12px;padding:10px 12px;margin-bottom:4px;box-shadow:0 6px 16px rgba(0,0,0,.35);}
.wl-tb-total{font-size:24px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;}
.wl-tb-seg{font-size:12px;font-weight:600;margin-top:3px;}
.wl-tb-warmup{color:#eab308;}.wl-tb-working{color:#22c55e;}.wl-tb-resting{color:#3b82f6;}
.wl-tb-btns{display:flex;gap:6px;flex:none;}
.wl-setgrid{display:grid;grid-template-columns:26px 1fr 1fr 46px 26px 42px;align-items:center;gap:6px;}
.wl-sethead{margin-bottom:2px;}
.wl-sethead span{font-size:10px;font-weight:700;letter-spacing:.04em;color:var(--faint);text-align:center;}
.wl-setrow{padding:5px 0;border-top:1px solid var(--line);}
.wl-setrow.skipped .wl-set-input{opacity:.5;}
.wl-set-menu{background:none;border:none;color:var(--faint);font-size:18px;cursor:pointer;padding:0;line-height:1;}
.wl-set-input{background:var(--bg2);border:1px solid var(--line);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:16px;text-align:center;padding:9px 4px;width:100%;box-sizing:border-box;outline:none;}
.wl-set-input:focus{border-color:var(--accent);}
.wl-set-rir{font-size:14px;}
.wl-set-skip{text-align:center;color:var(--faint);font-size:13px;}
.wl-set-tgt{display:flex;justify-content:center;}
.wl-set-log{width:36px;height:36px;border:2px solid var(--line);border-radius:8px;background:none;color:#fff;font-size:18px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;margin:0 auto;}
.wl-set-log.done{background:var(--good);border-color:var(--good);}
.wl-set-log.skipped{background:#6b7280;border-color:#6b7280;}
.wl-setrow:not(.done):not(.skipped) .wl-set-log{border-color:var(--good);}
.wl-exrow{display:flex;align-items:center;gap:8px;padding:11px 0;border-bottom:1px solid var(--line);}
.wl-exrow:last-child{border-bottom:none;}
.wl-exrow-main{flex:1;text-align:left;background:none;border:none;color:inherit;padding:0;cursor:pointer;display:flex;flex-direction:column;gap:2px;font-family:var(--sans);}
.wl-exrow-name{font-weight:600;font-size:15px;}
.wl-exrow-sub{font-size:12.5px;color:var(--faint);}
.wl-exrow-del{background:none;border:none;color:var(--faint);cursor:pointer;padding:6px;border-radius:8px;display:flex;align-items:center;flex-shrink:0;}
.wl-exrow-del:active{background:var(--bg2);color:var(--bad);}
.wl-mgchip{display:inline-flex;align-items:center;gap:6px;padding:7px 11px;border-radius:16px;font-size:13px;font-weight:600;border:1.5px solid var(--line);background:var(--bg2);color:var(--text);}
.wl-mgchip.cardio{border-color:#3b82f6;}.wl-mgchip.lifting{border-color:#22c55e;}.wl-mgchip.supp{border-color:#a855f7;}.wl-mgchip.rest{border-color:#9ca3af;}
.wl-mgchip-x{background:none;border:none;color:var(--faint);font-size:13px;cursor:pointer;padding:0;line-height:1;}
.wl-mgchip-input{background:none;border:none;outline:none;color:var(--text);font-size:13px;font-family:var(--sans);width:88px;}
.wl-title{font-size:26px;font-weight:800;margin:2px 0 0;letter-spacing:-.02em;}
.wl-datechip{font-size:12px;color:var(--muted);font-family:var(--mono);}
.wl-sync{font-size:9.5px;font-weight:700;font-family:var(--mono);padding:2px 8px;border-radius:20px;border:1px solid var(--line);color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
.wl-sync.ok{color:var(--good);border-color:rgba(92,214,160,.4);}
.wl-sync.saving,.wl-sync.syncing{color:var(--accent);border-color:rgba(245,181,68,.4);}
.wl-sync.offline,.wl-sync.error{color:var(--bad);border-color:rgba(242,109,91,.4);}
.wl-synctime{font-size:9px;font-family:var(--mono);color:var(--faint);}
.wl-ptr{position:fixed;top:calc(env(safe-area-inset-top,0px) + 8px);left:50%;transform:translateX(-50%) translateY(0);width:34px;height:34px;border-radius:50%;background:var(--card2);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;opacity:0;z-index:60;pointer-events:none;}
.wl-ptr-ring{width:16px;height:16px;border-radius:50%;border:2px solid var(--faint);border-top-color:var(--accent);}
.wl-ptr.ready .wl-ptr-ring{border-top-color:var(--good);}
.wl-ptr.spin .wl-ptr-ring{animation:wl-rot .7s linear infinite;}
@keyframes wl-rot{to{transform:rotate(360deg);}}
.wl-main{padding:0 20px 20px;flex:1;}
.wl-stack{display:flex;flex-direction:column;gap:14px;}

.wl-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;}
.wl-card-head{display:flex;align-items:center;justify-content:space-between;
  font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;}
.wl-card-head em{font-style:normal;color:var(--faint);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.08em;margin-left:6px;}
.wl-collapse-head{display:flex;align-items:center;justify-content:space-between;width:100%;background:none;border:none;color:var(--text);font-size:13px;font-weight:700;padding:2px 0;font-family:var(--sans);text-align:left;}
.wl-collapse-head em{font-style:normal;color:var(--faint);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.08em;margin-left:6px;}
.wl-chevron{color:var(--muted);font-size:20px;line-height:1;transition:transform .18s ease;flex-shrink:0;}
.wl-chevron.open{transform:rotate(90deg);}
.wl-collapse-body{margin-top:12px;}
.wl-count,.wl-badge{font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--bg2);
  border:1px solid var(--line);border-radius:20px;padding:2px 8px;font-weight:600;}
.wl-badge.warn{color:var(--bad);border-color:rgba(242,109,91,.4);}

.wl-hero{background:linear-gradient(150deg,var(--card2),var(--card));}
.wl-hero-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;}
.wl-mini-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);font-weight:600;}
.wl-bignum{font-family:var(--mono);font-size:42px;font-weight:600;line-height:1;letter-spacing:-.02em;}
.wl-unit{font-size:16px;color:var(--muted);margin-left:6px;font-weight:500;}
.wl-change{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;
  padding:7px 12px;border-radius:20px;font-family:var(--mono);}
.wl-change.good{color:var(--good);background:rgba(92,214,160,.12);}
.wl-change.bad{color:var(--bad);background:rgba(242,109,91,.12);}
.wl-progress-track{position:relative;height:8px;background:var(--bg2);border-radius:10px;border:1px solid var(--line);}
.wl-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--good));border-radius:10px;transition:width .5s ease;}
.wl-progress-marker{position:absolute;top:50%;width:14px;height:14px;border-radius:50%;
  background:var(--text);border:3px solid var(--card);transform:translate(-50%,-50%);box-shadow:0 0 0 1px var(--line2);}
.wl-progress-ends{display:flex;justify-content:space-between;margin-top:10px;font-size:12px;color:var(--muted);}
.wl-progress-ends b{color:var(--text);font-family:var(--mono);}
.wl-togo{color:var(--accent);font-weight:600;}

.wl-forecast-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.wl-fc{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px;}
.wl-fc-label{font-size:12px;font-weight:700;color:var(--text);}
.wl-fc-sub{font-size:11px;color:var(--faint);margin:2px 0 8px;font-family:var(--mono);}
.wl-fc-weeks{font-family:var(--mono);font-size:26px;font-weight:600;color:var(--accent);line-height:1;}
.wl-fc-weeks span{font-size:13px;color:var(--muted);}
.wl-fc-date{font-size:11px;color:var(--muted);margin-top:4px;font-family:var(--mono);}
.wl-fc-na{font-size:12px;color:var(--faint);line-height:1.4;margin-top:4px;}

.wl-alert{display:flex;gap:12px;background:rgba(242,109,91,.10);border:1px solid rgba(242,109,91,.35);
  border-radius:14px;padding:14px;color:var(--bad);}
.wl-alert svg{flex-shrink:0;margin-top:1px;}
.wl-alert-body{flex:1;}
.wl-alert-title{font-weight:700;font-size:14px;color:var(--text);}
.wl-alert-sub{font-size:12.5px;color:var(--muted);margin:2px 0 10px;}
.wl-alert-actions{display:flex;gap:8px;}
.wl-setup{width:100%;text-align:left;background:var(--accent-dim);border:1px solid rgba(245,181,68,.35);
  border-radius:14px;padding:14px 16px;color:var(--text);}
.wl-setup-title{font-weight:700;font-size:14px;color:var(--accent);}
.wl-setup-sub{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.4;}

.wl-today{display:flex;flex-direction:column;gap:2px;}
.wl-today-row{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;
  color:var(--text);padding:10px 4px;text-align:left;border-radius:8px;}
.wl-today-row:active{background:var(--bg2);}
.wl-today-label{font-size:13px;font-weight:600;min-width:60px;}
.wl-today-val{font-size:12.5px;color:var(--muted);margin-left:auto;font-family:var(--mono);text-align:right;}
.wl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.wl-dot.good{background:var(--good);} .wl-dot.bad{background:var(--bad);} .wl-dot.muted{background:var(--faint);}
.wl-chips{display:flex;flex-wrap:wrap;gap:8px;}
.wl-chip{font-size:12px;font-family:var(--mono);padding:6px 11px;border-radius:20px;
  border:1px solid var(--line);background:var(--bg2);color:var(--muted);}
.wl-chip.warn{color:var(--bad);border-color:rgba(242,109,91,.35);}

.wl-chart{width:100%;height:auto;display:block;touch-action:manipulation;}
.wl-chart text{font-family:var(--mono);}
.wl-readout{text-align:center;font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:6px;min-height:16px;}
.wl-readout b{color:var(--text);}
.wl-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:8px;justify-content:center;}
.wl-legend span{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);}
.wl-legend i{width:14px;height:3px;border-radius:2px;display:inline-block;}

.wl-statrow{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.wl-stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 8px;text-align:center;}
.wl-stat-label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);font-weight:600;}
.wl-stat-val{font-family:var(--mono);font-size:16px;font-weight:600;margin-top:4px;}
.wl-stat-val span{font-size:10px;color:var(--muted);}

.wl-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;}
.wl-field{display:flex;flex-direction:column;gap:6px;flex:1;min-width:0;}
.wl-field-full{width:100%;flex-basis:100%;}
.wl-field>span{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);font-weight:600;}
.wl-field>span em{font-style:normal;text-transform:none;letter-spacing:0;color:var(--muted);}
input{background:var(--bg2);border:1px solid var(--line);border-radius:10px;color:var(--text);
  padding:11px 12px;font-size:16px;font-family:var(--mono);width:100%;outline:none;}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim);}
input[type=date]{font-family:var(--sans);color-scheme:inherit;-webkit-appearance:none;appearance:none;text-align:left;min-width:0;}
input[type=date]::-webkit-date-and-time-value{text-align:left;margin:0;}
input[type=date]::-webkit-calendar-picker-indicator{opacity:.55;}
.wl-inline-input{font-family:var(--sans);flex:1;}
.wl-macrogrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.wl-macro3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}

.wl-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:10px;
  padding:11px 16px;font-size:14px;font-weight:700;transition:filter .15s;}
.wl-btn svg{width:16px;height:16px;}
.wl-btn-primary{background:var(--accent);color:var(--on-accent);}
.wl-btn-primary:active{filter:brightness(1.12);}
.wl-btn-alert{background:var(--bad);color:#fff;}
.wl-btn-ghost{background:var(--bg2);color:var(--muted);border:1px solid var(--line);}
.wl-btn-danger{background:rgba(242,109,91,.15);color:var(--bad);border:1px solid rgba(242,109,91,.4);}
.wl-full{width:100%;} .wl-add{align-self:flex-end;}
.wl-link{background:none;border:none;color:var(--accent);font-size:12px;font-weight:600;padding:0;}
.wl-hint{font-size:12px;color:var(--muted);line-height:1.45;margin-top:4px;}
.wl-empty{color:var(--faint);font-size:13px;text-align:center;padding:22px 0;}

.wl-tbar{position:relative;height:16px;background:var(--bg);border:1px solid var(--line);border-radius:6px;overflow:hidden;margin-top:2px;}
.wl-tbar-fill{height:100%;background:var(--accent);opacity:.7;transition:width .3s;}
.wl-tbar-fill.over{background:var(--bad);}
.wl-tbar-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-family:var(--mono);color:var(--text);}

.wl-list{display:flex;flex-direction:column;}
.wl-list-row{display:flex;align-items:center;gap:10px;padding:11px 4px;border-bottom:1px solid var(--line);
  width:100%;text-align:left;background:none;border-left:none;border-right:none;border-top:none;color:var(--text);}
.wl-list-row:last-child{border-bottom:none;}
.wl-list-tap:active{background:var(--bg2);}
.wl-list-date{font-size:13px;}

.wl-achip.supp{color:#a855f7;border-color:#a855f7;}
.wl-achip.rest{color:#9ca3af;border-color:#9ca3af;}

function prepChart(src){

function shareOrDownload(name,mime,text){

function idb(){return new Promise(function(res,rej){
  if(photoDB)return res(photoDB);
  if(typeof indexedDB==="undefined")return rej("no idb");
  var r=indexedDB.open("wl_photos",1);
  r.onupgradeneeded=function(){var db=r.result;if(!db.objectStoreNames.contains("photos")){var os=db.createObjectStore("photos",{keyPath:"id"});os.createIndex("date","date",{unique:false});}};
  r.onsuccess=function(){photoDB=r.result;res(photoDB);};r.onerror=function(){rej(r.error);};});}

function processImage(file){return new Promise(function(res){
  try{var url=URL.createObjectURL(file);var img=new Image();
    img.onload=function(){URL.revokeObjectURL(url);var max=1600;var scale=Math.min(1,max/Math.max(img.width,img.height));

      var cv=document.createElement("canvas");cv.width=cw;cv.height=ch;cv.getContext("2d").drawImage(img,0,0,cw,ch);
      cv.toBlob(function(b){res(b||file);},"image/jpeg",0.85);};
    img.onerror=function(){URL.revokeObjectURL(url);res(file);};img.src=url;
  }catch(e){res(file);}});}

function weekStartOf(iso){var ws=parseInt(state.settings.weekStart,10)||0;var d=parseISO(iso);var diff=(d.getDay()-ws+7)%7;d.setDate(d.getDate()-diff);d.setHours(0,0,0,0);return d;}
function renderDiary(){var host=document.getElementById("wl-diary");if(!host)return;
  idbAll().then(function(all){var host2=document.getElementById("wl-diary");if(!host2)return;
    clearPhotoURLs();
    if(!all.length){host2.innerHTML='<div class="wl-empty" style="padding:20px 0">No food photos yet. Open a day\u2019s Food diary to add meals.</div>';return;}
    var byDate={};all.forEach(function(p){(byDate[p.date]=byDate[p.date]||[]).push(p);});
    var weekSet={};Object.keys(byDate).forEach(function(d){weekSet[toISO(weekStartOf(d))]=true;});
    var weeks=Object.keys(weekSet).sort().reverse();
    var show=Math.min(state.diaryWeeks||1,weeks.length);var shown=weeks.slice(0,show);
    var MEALS=[["breakfast","Breakfast"],["lunch","Lunch"],["snack","Snack"],["dinner","Dinner"],["","Other"]];
    var html="";
    shown.forEach(function(wkISO){var ws0=parseISO(wkISO),we=addDays(ws0,6);
      html+='<div class="wl-diary-weekhead">'+fmtShort(ws0)+' – '+fmtShort(we)+(toISO(weekStartFor(0))===wkISO?' · This week':'')+'</div>';
      for(var i=0;i<7;i++){var dISO=toISO(addDays(ws0,i));var photos=byDate[dISO];if(!photos)continue;
        var f=state.food[dISO]||{};var cal=num(f.calories),p=num(f.protein),c=num(f.carbs),ft=num(f.fat);
        html+='<div class="wl-card wl-diary-day"><div class="wl-diary-dayhead"><span class="wl-diary-date">'+fmtLong(parseISO(dISO))+(dISO===todayISO()?' · Today':'')+'</span></div>';
        if(cal!=null||p!=null||c!=null||ft!=null){html+='<div class="wl-diary-macros">'+(cal!=null?'<b>'+Math.round(cal).toLocaleString()+'</b> cal':'<span style="color:var(--faint)">calories not logged</span>')+(p!=null?'  ·  P: '+p+'g':'')+(ft!=null?'  ·  F: '+ft+'g':'')+(c!=null?'  ·  C: '+c+'g':'')+'</div>';
          var mc=(p||0)*4+(c||0)*4+(ft||0)*9;if((p!=null||c!=null||ft!=null)&&cal!=null&&Math.abs(cal-mc)>2)html+='<div class="wl-diary-partial">⚠️ Partial log — macros don\u2019t total the calories</div>';}
        MEALS.forEach(function(m){var items=photos.filter(function(x){return (x.meal||"")===m[0];});if(!items.length)return;
          html+='<div class="wl-meal-label">'+m[1]+'</div><div class="wl-photos">';
          items.forEach(function(x){var url=URL.createObjectURL(x.blob);photoURLs.push(url);photoMap[x.id]=url;html+='<button class="wl-photo" data-act="photo:view" data-id="'+x.id+'" style="background-image:url('+url+')"></button>';});
          html+='</div>';});
        html+='</div>';
      }
    });
    if(weeks.length>show)html+='<button class="wl-btn wl-btn-ghost wl-full" style="margin-top:4px" data-act="diary:older">↓ Load older week</button>';
    host2.innerHTML=html;
  }).catch(function(){var host2=document.getElementById("wl-diary");if(host2)host2.innerHTML='<div class="wl-empty" style="padding:20px 0">Photos aren\u2019t available on this device.</div>';});}
function openLightbox(id){var url=photoMap[id];if(!url)return;

function zoneFromHR(hr,mx){if(hr==null||mx==null||mx<=0)return null;var p=hr/mx;if(p<0.60)return 1;if(p<0.70)return 2;if(p<0.80)return 3;if(p<0.90)return 4;return 5;}
function estMaxHR(){var age=num(state.settings.age);if(age==null)return null;return Math.round(208-0.7*age);}
function effMaxHR(){var m=num(state.settings.maxHR);return m!=null?m:estMaxHR();}
function zoneAreaHTML(cf,pfx){pfx=pfx||"cf";var mx=effMaxHR();var hr=num(cf.hr);
  if(mx!=null&&hr!=null){var z=zoneFromHR(hr,mx);return '<div class="wl-cf-label">Zone</div><div class="wl-hint">From your avg HR: <b>Zone '+z+'</b> ('+Math.round(hr/mx*100)+'% of max '+mx+' bpm) — set automatically.</div>';}
  var label=mx!=null?'Zone <em>enter avg HR above to auto-detect</em>':'Zone';
  return '<div class="wl-cf-label">'+label+'</div><div class="wl-seg wl-seg-wide">'+[1,2,3,4,5].map(function(z){return '<button class="'+(cf.zone===z?"on":"")+'" data-act="'+pfx+':zone" data-zone="'+z+'">'+z+'</button>';}).join("")+'</div>';}
function weekTrainingStats(ws){var out={cardioSessions:0,cardioMins:0,liftSessions:0,liftMins:0,totalMins:0};
  for(var i=0;i<7;i++){var iso=toISO(addDays(ws,i));
    ((state.training.sessions||{})[iso]||[]).forEach(function(x){if(x.kind==="cardio"){out.cardioSessions++;out.cardioMins+=(num(x.mins)||0);}});
    ((state.training.liftSessions||{})[iso]||[]).forEach(function(x){out.liftSessions++;out.liftMins+=(num(x.mins)||0);});}
  out.totalMins=out.cardioMins+out.liftMins;return out;}
function goalBarHTML(label,val,goal,unit,soon){var pct=goal>0?Math.min(100,Math.round(val/goal*100)):0;var done=goal>0&&val>=goal;
  return '<div class="wl-goalrow"><div class="wl-goalrow-top"><span>'+label+(soon?' <em style="color:var(--faint);font-style:normal">· logging soon</em>':'')+'</span><span class="wl-goalrow-val'+(done?" done":"")+'">'+val+' / '+goal+(unit?' '+unit:'')+(done?' ✓':'')+'</span></div><div class="wl-goalbar"><div class="wl-goalbar-fill'+(done?" done":"")+'" style="width:'+pct+'%"></div></div></div>';}
function trainingGoalsHTML(ws){var st=weekTrainingStats(ws);var f=state.settings;
  var emGoal=num(f.exerciseMinGoal),cardGoal=num(f.cardioSessGoal),liftGoal=num(f.liftSessGoal);
  if(emGoal==null&&cardGoal==null&&liftGoal==null)return '<div class="wl-hint">Set weekly training goals in Settings → Goals to track them here.</div>';
  var h='';
  if(emGoal!=null)h+=goalBarHTML("Exercise minutes",st.totalMins,emGoal,"min",false);
  if(cardGoal!=null)h+=goalBarHTML("Cardio sessions",st.cardioSessions,cardGoal,"",false);
  if(liftGoal!=null)h+=goalBarHTML("Lifting sessions",st.liftSessions,liftGoal,"",false);
  return h;}

var NAV=[["overview","Overview"],["calendar","Daily Log"],["weight","Trends"],["summary","Summary"],["train","Activity"]];
function askConfirm(message,fn,opts){opts=opts||{};state.pendingConfirm={message:message,fn:fn,danger:opts.danger!==false,label:opts.label||"Delete"};render();}
function confirmOverlayHTML(){var c=state.pendingConfirm;if(!c)return "";

function render(){
  clearPhotoURLs();
  var title=state.view==="settings"?"Settings":state.view==="diary"?"Food Diary":state.view==="exlib"?"Exercise Library":state.view==="routine"?"Routine":state.view==="rlaunch"?"Routine":state.view==="quicklog"?"Quick log":state.view==="workout"?"Workout":(NAV.filter(function(n){return n[0]===state.view;})[0]||["","" ])[1];
  var body=state.view==="overview"?view_overview():(state.view==="calendar"||state.view==="food")?view_calendar():state.view==="weight"?view_weight():state.view==="summary"?view_summary():state.view==="diary"?view_diary():state.view==="train"?view_train():state.view==="exlib"?view_exlib():state.view==="routine"?view_routine():state.view==="rlaunch"?view_rlaunch():state.view==="quicklog"?view_quicklog():state.view==="workout"?view_workout():state.view==="liftview"?view_liftview():view_settings();
  var nav='<nav class="wl-nav">'+NAV.map(function(n){return '<button class="wl-navbtn '+(state.view===n[0]||(n[0]==="summary"&&state.view==="diary")?"on":"")+'" data-act="go" data-view="'+n[0]+'">'+I[n[0]]+'<span>'+n[1]+'</span></button>';}).join("")+'</nav>';
  var _ini=(state.settings.name||"").trim().charAt(0).toUpperCase();
  var avatar='<button class="wl-avatar'+(state.view==="settings"?" on":"")+'" data-act="go" data-view="settings" aria-label="Settings">'+(_ini||I.user.replace("<svg",'<svg width="18" height="18"'))+'</button>';

  document.getElementById("app").innerHTML='<div class="wl-shell"><header class="wl-header"><div><div class="wl-eyebrow">Progress Tracker</div><h1 class="wl-title">'+title+'</h1></div><div style="display:flex;align-items:center;gap:10px">'+hdrRight+avatar+'</div></header><main class="wl-main">'+body+'</main>'+nav+'</div>'+confirmOverlayHTML()+woOverlaysHTML();

document.addEventListener("click",function(e){
  var el=e.target.closest("[data-act]");if(!el)return;var a=el.getAttribute("data-act");
  if(a==="go"){state.view=el.getAttribute("data-view");if(state.view==="diary")state.diaryWeeks=1;state.alertDismissed=false;state.confirmReset=false;state.pasteOpen=false;state.syncPasteOpen=false;state.inviteCode=null;state.joinOpen=false;render();return;}
  if(a==="confirm:yes"){var pc=state.pendingConfirm;state.pendingConfirm=null;if(pc&&pc.fn)pc.fn();render();return;}
  if(a==="confirm:no"){state.pendingConfirm=null;render();return;}
  if(a==="alert:dismiss"){state.alertDismissed=true;render();return;}
  if(a==="chart:pt"){var ts=+el.getAttribute("data-ts"),w=+el.getAttribute("data-w"),av=el.getAttribute("data-avg");
    var r=document.getElementById("wl-readout");if(r)r.innerHTML='<b>'+r1(w)+'</b> '+state.settings.units+' · '+fmtFull(new Date(ts))+(av!=="null"?' · avg '+av:'');return;}
  if(a==="weight:add"){var dt=document.getElementById("wl-wdate").value,vv=num(document.getElementById("wl-wval").value);
    if(vv==null){toast("Enter a weight");return;}state.weights=state.weights.filter(function(x){return x.date!==dt;});state.weights.push({date:dt,weight:vv});save();render();return;}
  if(a==="weight:del"){var dd=el.getAttribute("data-date");askConfirm("Delete this weigh-in?",function(){state.weights=state.weights.filter(function(x){return x.date!==dd;});save();});return;}
  if(a==="food:pick"){state.selDate=el.getAttribute("data-date");state.view="calendar";render();return;}
  if(a==="opentoday"){state.selDate=todayISO();state.calY=new Date().getFullYear();state.calM=new Date().getMonth();state.view="calendar";render();return;}
  if(a==="ai:copy"){copyText(weeklyAIText(),"Copied your week — paste into your AI to generate");return;}
  if(a==="ai:gen"){genSummary();return;}
  if(a==="sum:toggle"){state.sumOpen=(state.sumOpen===false);try{localStorage.setItem("wl_sumopen",state.sumOpen?"1":"0");}catch(e){}render();return;}
  if(a==="night:toggle"){state.nightOpen=(state.nightOpen===false);render();return;}
  if(a==="diary:older"){state.diaryWeeks=(state.diaryWeeks||1)+1;renderDiary();return;}
  if(a==="tr:prev"||a==="tr:next"){var td=parseISO(state.trainDate);if(a==="tr:next"&&state.trainDate>=todayISO())return;td.setDate(td.getDate()+(a==="tr:next"?1:-1));state.trainDate=toISO(td);state.cardioForm=null;render();return;}

  state.food=d.food||{};state.workouts=d.workouts||{};state.steps=d.steps||{};state.notes=d.notes||{};state.sleep=d.sleep||{};state.weeklySummary=d.weeklySummary||null;state.nightlySummary=d.nightlySummary||null;
  state.presets=(Array.isArray(d.presets)&&d.presets.length)?d.presets:DEFAULT_PRESETS.slice();
  state.pasteOpen=false;state.view="overview";applyTheme(state.settings.theme||"ink");save();toast("Data restored");
  },{label:"Replace",danger:false});
}
function exportData(){
  var json=backupJSON();var name="weight-tracker-backup-"+todayISO()+".json";
  try{
    var file=new File([json],name,{type:"application/json"});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      navigator.share({files:[file],title:"Weight Tracker backup"}).catch(function(){});return;
    }
  }catch(e){}
  var blob=new Blob([json],{type:"application/json"});var url=URL.createObjectURL(blob);
  var a=document.createElement("a");a.href=url;a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},1000);toast("Backup exported");
}
function copyBackup(){
  var json=backupJSON();
  if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(json).then(function(){toast("Backup copied");}).catch(function(){fallbackCopy(json);});
  else fallbackCopy(json);
}
function fallbackCopy(text){
  var ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand("copy");toast("Backup copied");}catch(e){toast("Couldn't copy — use Export instead");}document.body.removeChild(ta);
}
function copyText(text,msg){
  if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(text).then(function(){toast(msg||"Copied");}).catch(function(){legacyCopy(text,msg);});
  else legacyCopy(text,msg);
}
function legacyCopy(text,msg){
  var ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand("copy");toast(msg||"Copied");}catch(e){toast("Couldn't copy");}document.body.removeChild(ta);
}
function updateApp(){toast("Fetching latest…");setTimeout(function(){location.replace(location.origin+location.pathname+"?v="+Date.now());},250);}
function extractBuild(txt){var m=/APP_BUILD="([^"]+)"/.exec(txt);return m?m[1]:null;}
function checkForUpdate(){
  fetch(location.origin+location.pathname+"?vc="+Date.now(),{cache:"no-store"})
    .then(function(r){return r.text();})
    .then(function(txt){var sv=extractBuild(txt);if(!sv||sv===APP_BUILD)return;
      var already="";try{already=sessionStorage.getItem("wl_reloaded_for")||"";}catch(e){}
      if(already===sv){showUpdateBanner();return;} /* reload didn't stick (CDN lag) — offer instead of looping */
      try{sessionStorage.setItem("wl_reloaded_for",sv);}catch(e){}
      updateApp();
    }).catch(function(){});
}
function showUpdateBanner(){
  if(document.getElementById("wl-update-banner"))return;
  var b=document.createElement("div");b.id="wl-update-banner";b.className="wl-update-banner";
  b.innerHTML='<span>New version available</span><button class="wl-btn" style="background:var(--on-accent);color:var(--accent)" data-act="app:update">Update now</button>';
  document.body.appendChild(b);
}

/* ---------------- app icon (generated, for Add to Home Screen) ---------------- */
function makeIcon(){
  try{var cv=document.createElement("canvas");cv.width=180;cv.height=180;var x=cv.getContext("2d");
    var g=x.createLinearGradient(0,0,180,180);g.addColorStop(0,"#212836");g.addColorStop(1,"#10131A");
    x.fillStyle=g;x.fillRect(0,0,180,180);
    x.strokeStyle="#5CD6A0";x.setLineDash([6,6]);x.lineWidth=3;x.beginPath();x.moveTo(28,138);x.lineTo(152,138);x.stroke();x.setLineDash([]);
    var pts=[[30,50],[58,72],[86,64],[112,96],[140,88],[150,116]];
    x.strokeStyle="#F5B544";x.lineWidth=8;x.lineJoin="round";x.lineCap="round";x.beginPath();
    pts.forEach(function(p,i){i?x.lineTo(p[0],p[1]):x.moveTo(p[0],p[1]);});x.stroke();
    x.fillStyle="#F7C56E";pts.forEach(function(p){x.beginPath();x.arc(p[0],p[1],6,0,7);x.fill();});
    var data=cv.toDataURL("image/png");
    var link=document.createElement("link");link.rel="apple-touch-icon";link.href=data;document.head.appendChild(link);
    var fav=document.createElement("link");fav.rel="icon";fav.href=data;document.head.appendChild(fav);
    var man={name:"Weight Tracker",short_name:"Weight",start_url:".",display:"standalone",background_color:"#0F1218",theme_color:"#0F1218",icons:[{src:data,sizes:"180x180",type:"image/png"},{src:data,sizes:"512x512",type:"image/png"}]};
    var ml=document.createElement("link");ml.rel="manifest";ml.href="data:application/manifest+json,"+encodeURIComponent(JSON.stringify(man));document.head.appendChild(ml);
  }catch(e){}
}

/* ---------------- init ---------------- */
load();loadTraining();loadWorkout();ensureIdentity();applyTheme(state.settings.theme||"ink");makeIcon();render();autoSync();if(state.workout)startWoTick();
try{if(navigator.storage&&navigator.storage.persist)navigator.storage.persist();}catch(e){}
checkForUpdate();
document.addEventListener("visibilitychange",function(){if(!document.hidden)checkForUpdate();});

/* ---------------- pull-to-refresh ---------------- */
(function(){
  var startY=0,pulling=false,dist=0,THRESH=64,ind=null;
  function scrollTop(){return window.scrollY||document.documentElement.scrollTop||0;}
  function el(){if(!ind){ind=document.createElement("div");ind.className="wl-ptr";ind.innerHTML='<div class="wl-ptr-ring"></div>';document.body.appendChild(ind);}return ind;}
  function move(px,dragging){var e=el();e.style.transition=dragging?"none":"transform .25s ease,opacity .25s ease";e.style.transform="translateX(-50%) translateY("+px+"px)";e.style.opacity=String(Math.min(1,px/40));if(px>=THRESH)e.classList.add("ready");else e.classList.remove("ready");}
  document.addEventListener("touchstart",function(e){
    pulling=false;
    if(!syncOn()||scrollTop()>0)return;
    if(e.target.closest&&e.target.closest("input,textarea,select"))return;
    startY=e.touches[0].clientY;pulling=true;dist=0;
  },{passive:true});
  document.addEventListener("touchmove",function(e){
    if(!pulling)return;
    if(scrollTop()>0){pulling=false;move(0,false);return;}
    dist=e.touches[0].clientY-startY;
    if(dist<=0){move(0,true);return;}
    if(dist>8)e.preventDefault();
    move(Math.min(dist*0.5,84),true);
  },{passive:false});
  document.addEventListener("touchend",function(){
    if(!pulling)return;pulling=false;
    if(dist*0.5>=THRESH){var e=el();e.classList.add("spin");e.classList.remove("ready");e.style.transition="transform .2s ease";e.style.transform="translateX(-50%) translateY(48px)";e.style.opacity="1";
      cloudPull(true,function(){setTimeout(function(){e.classList.remove("spin");move(0,false);},350);});}
    else move(0,false);
    dist=0;
  });
})();
</script>
