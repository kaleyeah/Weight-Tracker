.wl-field{display:flex;flex-direction:column;gap:6px;flex:1;min-width:0;}
.wl-field-full{width:100%;flex-basis:100%;}
.wl-field>span{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);font-weight:600;}
.wl-field>span em{font-style:normal;text-transform:none;letter-spacing:0;color:var(--muted);}
input{background:var(--bg2);border:1px solid var(--line);border-radius:10px;color:var(--text);
  padding:11px 12px;font-size:16px;font-family:var(--mono);width:100%;outline:none;}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim);}
input[type=date]{font-family:var(--sans);color-scheme:inherit;-webkit-appearance:none;appearance:none;text-align:left;min-width:0;}
input[type=date]::-webkit-date-and-time-value{text-align:left;margin:0;}
input[type=date]::-webkit-calendar-picker-indicator{opacity:.55;}
.wl-inline-input{font-family:var(--sans);flex:1;}
.wl-macrogrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.wl-macro3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}

.wl-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:10px;
  padding:11px 16px;font-size:14px;font-weight:700;transition:filter .15s;}
.wl-btn svg{width:16px;height:16px;}
.wl-btn-primary{background:var(--accent);color:var(--on-accent);}
.wl-btn-primary:active{filter:brightness(1.12);}
.wl-btn-alert{background:var(--bad);color:#fff;}
.wl-btn-ghost{background:var(--bg2);color:var(--muted);border:1px solid var(--line);}
.wl-btn-danger{background:rgba(242,109,91,.15);color:var(--bad);border:1px solid rgba(242,109,91,.4);}
.wl-full{width:100%;} .wl-add{align-self:flex-end;}
.wl-link{background:none;border:none;color:var(--accent);font-size:12px;font-weight:600;padding:0;}
.wl-hint{font-size:12px;color:var(--muted);line-height:1.45;margin-top:4px;}
.wl-seg2{display:flex;gap:6px;background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:4px;}
.wl-seg2btn{flex:1;border:none;background:none;color:var(--muted);font-family:var(--sans);font-weight:700;font-size:12.5px;padding:9px 6px;border-radius:8px;cursor:pointer;}
.wl-seg2btn.on{background:var(--accent);color:var(--on-accent);}
.wl-mtoggle{display:flex;gap:6px;}
.wl-mvbtn{flex:1;border:1px solid var(--line);background:var(--bg2);color:var(--muted);font-family:var(--sans);font-weight:700;font-size:12px;padding:7px;border-radius:9px;cursor:pointer;}
.wl-mvbtn.on{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
.wl-setrng{display:flex;align-items:center;gap:7px;padding:5px 0;}
.wl-setrng-n{font-size:11px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.05em;width:46px;}
.wl-setrng input{width:44px;text-align:center;background:var(--bg2);border:1px solid var(--line2);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:14px;padding:6px 4px;}
.wl-setrng-tag{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.05em;margin-left:auto;}
.wl-info{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--muted);color:var(--muted);font-size:11px;font-weight:800;line-height:1;display:inline-flex;align-items:center;justify-content:center;background:none;font-family:var(--sans);cursor:pointer;padding:0;vertical-align:middle;flex:none;}
.wl-infobg{z-index:2100}
.wl-infosheet{background:var(--card2);border:1px solid var(--line2);border-radius:20px;width:100%;max-width:460px;padding:16px 16px 22px;max-height:82vh;overflow-y:auto;}
.wl-infogrip{width:38px;height:4px;border-radius:3px;background:var(--line2);margin:2px auto 12px;}
.wl-inforow{display:flex;align-items:center;gap:11px;margin-bottom:14px;}
.wl-infotitle{font-size:18px;font-weight:800;letter-spacing:-.01em;display:block;line-height:1.2;}
.wl-infobody p{font-size:14.5px;color:#D6DCE6;line-height:1.55;margin:0 0 11px;}
.wl-infobody p:last-child{margin-bottom:0;}
.wl-infobody b{color:var(--text);}
.wl-recaphead{display:flex;align-items:center;gap:6px;}
.wl-recapnav{display:flex;gap:4px;flex:none;}
.wl-recaparw{width:30px;height:30px;border-radius:8px;background:var(--bg2);border:1px solid var(--line);color:var(--muted);font-size:18px;line-height:0;display:flex;align-items:center;justify-content:center;flex:none;font-family:var(--sans);cursor:pointer;padding:0;}
.wl-recaparw.off{opacity:.35;}
.wl-recap-new{border-color:rgba(245,181,68,.55);box-shadow:0 0 0 1px rgba(245,181,68,.22),0 6px 24px rgba(245,181,68,.12);}
.wl-empty{color:var(--faint);font-size:13px;text-align:center;padding:22px 0;}

.wl-tbar{position:relative;height:16px;background:var(--bg2);border:1px solid var(--line);border-radius:6px;overflow:hidden;margin-top:2px;}
.wl-tbar-fill{height:100%;background:var(--accent);opacity:.7;transition:width .3s;}
.wl-tbar-fill.over{background:var(--bad);}
.wl-tbar-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-family:var(--mono);color:var(--text);}

.wl-list{display:flex;flex-direction:column;}
.wl-list-row{display:flex;align-items:center;gap:10px;padding:11px 4px;border-bottom:1px solid var(--line);
  width:100%;text-align:left;background:none;border-left:none;border-right:none;border-top:none;color:var(--text);}
.wl-list-row:last-child{border-bottom:none;}
.wl-list-tap:active{background:var(--bg2);}
.wl-list-date{font-size:13px;}
.wl-list-val{margin-left:auto;font-family:var(--mono);font-size:13px;color:var(--muted);}
.wl-icon-btn{background:none;border:none;color:var(--faint);padding:6px;border-radius:8px;
  display:inline-flex;font-size:18px;line-height:1;}
.wl-icon-btn:active{color:var(--bad);background:var(--bg2);}
.wl-del{color:var(--bad);background:rgba(242,109,91,.12);margin-left:12px;}
.wl-del:active{background:rgba(242,109,91,.28);}

.wl-cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.wl-cal-title{font-weight:700;font-size:15px;}
.wl-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.wl-cal-dow{margin-bottom:6px;}
.wl-dow{text-align:center;font-size:10px;color:var(--faint);font-weight:600;text-transform:uppercase;}
.wl-cell{aspect-ratio:1;border:1px solid var(--line);border-radius:9px;background:var(--bg2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  color:var(--text);position:relative;padding:0;}
.wl-cell.empty{border:none;background:none;}
.wl-cell.today{border-color:var(--accent);}
.wl-cell.sel{background:var(--accent-dim);border-color:var(--accent);}
.wl-cell-num{font-size:13px;font-family:var(--mono);}
.wl-cell-dots{display:flex;gap:2px;position:absolute;bottom:6px;left:0;right:0;justify-content:center;}
.wl-cell-dots i{width:4px;height:4px;border-radius:50%;background:var(--good);}
.wl-cell-dots i.dot-cardio{background:#3b82f6;}
.wl-cell-dots i.dot-lifting{background:#22c55e;}
.wl-cell-dots i.dot-supp{background:#a855f7;}
.wl-cell-dots i.dot-rest{background:#9ca3af;}
.wl-cell-dots i.dot-other{background:var(--faint);}
.wl-cell-dots i.dot-data{background:var(--good);}
.wl-preset-list{display:flex;flex-wrap:wrap;gap:8px;}
.wl-achip{display:inline-flex;align-items:center;gap:5px;padding:9px 14px;border-radius:20px;font-size:13px;font-weight:600;font-family:var(--sans);border:1.5px solid;background:transparent;cursor:pointer;line-height:1;}
.wl-achip.cardio{color:#3b82f6;border-color:#3b82f6;}
.wl-achip.lifting{color:#22c55e;border-color:#22c55e;}
.wl-achip.supp{color:#a855f7;border-color:#a855f7;}
.wl-achip.rest{color:#9ca3af;border-color:#9ca3af;}
.wl-achip.other{color:var(--faint);border-color:var(--line);}
.wl-achip.on.cardio{background:#3b82f6;color:#fff;}
.wl-achip.on.lifting{background:#22c55e;color:#fff;}
.wl-achip.on.supp{background:#a855f7;color:#fff;}
.wl-achip.on.rest{background:#6b7280;color:#fff;}
.wl-achip.on.other{background:var(--faint);color:var(--bg);}
.wl-achip-ro{display:inline-flex;align-items:center;padding:7px 12px;border-radius:9px;font-size:13px;font-weight:600;}
.wl-achip-ro.cardio{background:rgba(59,130,246,.16);color:#82abff;}
.wl-achip-ro.lifting{background:rgba(34,197,94,.16);color:#5ee98f;}
.wl-achip-ro.supp{background:rgba(168,85,247,.16);color:#c791fb;}
.wl-achip-ro.rest{background:rgba(156,163,175,.16);color:#c3cbd6;}
.wl-achip-ro.other{background:var(--bg2);color:var(--muted);}
.wl-btn-cardio{background:#3b82f6;color:#fff;}
.wl-btn-lift{background:#22c55e;color:#fff;}
.wl-btn-rest{background:#6b7280;color:#fff;}
.wl-btn-supp{background:#a855f7;color:#fff;}
.wl-caticon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex:none;background:rgba(255,255,255,.14);}
.wl-caticon svg{width:22px;height:22px;}
.wl-cathead{display:flex;align-items:center;gap:13px;margin-bottom:12px;}
.wl-catmeta{min-width:0;}
.wl-cattype{font-size:17px;font-weight:800;letter-spacing:-.01em;color:#fff;}
.wl-catsum{font-size:13px;margin-top:1px;color:rgba(255,255,255,.82);}
.wl-card.catcard .wl-hint{color:rgba(255,255,255,.72);}
.wl-card.catcard .wl-sess{border-bottom-color:rgba(255,255,255,.16);}
.wl-card.catcard .wl-sess-type{color:#fff;}
.wl-card.catcard .wl-sess-meta{color:rgba(255,255,255,.62);}
.wl-card.catcard .wl-icon-btn{color:rgba(255,255,255,.6);}
.wl-card.catcard .wl-inprogress{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.42);color:#fff;}
.wl-card.catcard .wl-ip-badge{color:#fff;}
.wl-card.catcard .wl-achip{color:#fff;border-color:rgba(255,255,255,.35);background:rgba(255,255,255,.10);}
.wl-card.catcard .wl-achip.on{background:rgba(255,255,255,.92);color:#1a2230;border-color:transparent;}
.wl-card.catcard.car{background:linear-gradient(150deg,#5b86ff,#2f4fd4);border-color:#5b86ff;box-shadow:0 8px 26px rgba(77,127,255,.32);}
.wl-card.catcard.lift{background:linear-gradient(150deg,#2fbf6a,#12833f);border-color:#2fbf6a;box-shadow:0 8px 26px rgba(34,197,94,.3);}
.wl-card.catcard.rest{background:linear-gradient(150deg,#6b7a92,#3f4a5e);border-color:#6b7a92;box-shadow:0 8px 26px rgba(120,140,170,.22);}
.wl-card.catcard.supp{background:linear-gradient(150deg,#b15cf0,#7c3aed);border-color:#b15cf0;box-shadow:0 8px 26px rgba(168,85,247,.32);}
.wl-card.catcard .wl-caticon{background:rgba(255,255,255,.2);color:#fff;}
.wl-card.catcard .wl-btn-lift,.wl-card.catcard .wl-btn-cardio,.wl-card.catcard .wl-btn-rest,.wl-card.catcard .wl-btn-supp{background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.3);}
.wl-cat-cardio{background:rgba(59,130,246,.15);color:#3b82f6;}
.wl-cat-lifting{background:rgba(34,197,94,.15);color:#22c55e;}
.wl-cat-supp{background:rgba(168,85,247,.15);color:#a855f7;}
.wl-cat-rest{background:rgba(156,163,175,.16);color:#9ca3af;}
.wl-cat-other{background:var(--bg2);color:var(--faint);}
.wl-actcat{flex-shrink:0;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;padding:5px 8px;border-radius:6px;white-space:nowrap;}
.wl-select{flex:1;min-width:0;background:var(--bg2);border:1px solid var(--line);border-radius:10px;color:var(--text);font-size:14px;font-family:var(--sans);padding:0 10px;outline:none;}
.wl-calnote{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:8px;margin-top:10px;padding:10px 12px;border-radius:10px;background:rgba(234,179,8,.12);border:1px solid rgba(234,179,8,.35);font-size:12.5px;color:var(--text);line-height:1.4;}
.wl-calnote-actions{display:flex;gap:6px;flex-shrink:0;}
.wl-calnote-btn{padding:6px 12px;border-radius:8px;border:none;background:#eab308;color:#1a1400;font-size:12px;font-weight:700;font-family:var(--sans);cursor:pointer;}
.wl-calnote-btn.ghost{background:transparent;border:1px solid var(--line);color:var(--faint);}
.wl-preset{display:inline-flex;align-items:center;gap:6px;padding:9px 13px;border-radius:22px;
  border:1px solid var(--line);background:var(--bg2);color:var(--muted);font-size:13px;font-weight:600;}
.wl-preset svg{width:15px;height:15px;}
.wl-preset.on{background:var(--good);color:var(--on-good);border-color:var(--good);}
.wl-selected-note{margin-top:12px;font-size:12.5px;color:var(--good);font-weight:500;}
.wl-preset-manage{display:flex;flex-direction:column;gap:2px;margin-bottom:12px;}
.wl-preset-manage-row{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--line);font-size:13.5px;color:var(--text);}
.wl-preset-manage-row:last-child{border-bottom:none;}
.wl-preset-manage-row button{margin-left:auto;}

.wl-seg{display:flex;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px;}
.wl-seg-wide{width:100%;margin-bottom:14px;}
.wl-seg button{flex:1;background:none;border:none;color:var(--muted);font-size:13px;font-weight:600;padding:9px 14px;border-radius:8px;}
.wl-seg button.on{background:var(--accent);color:var(--on-accent);}
.wl-danger{border-color:rgba(242,109,91,.25);}
.wl-theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.wl-theme{display:flex;align-items:center;gap:10px;padding:12px;border-radius:12px;border:1px solid var(--line);background:var(--bg2);color:var(--text);text-align:left;position:relative;}
.wl-theme.on{border-color:var(--accent);background:var(--accent-dim);}
.wl-theme-sw{display:inline-flex;gap:3px;flex-shrink:0;}
.wl-theme-sw i{width:14px;height:14px;border-radius:4px;border:1px solid rgba(128,128,128,.25);}
.wl-theme-name{font-size:12.5px;font-weight:700;}
.wl-theme-check{margin-left:auto;color:var(--accent);display:inline-flex;}
.wl-optlist{display:flex;flex-direction:column;gap:6px;}
.wl-opt{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;text-align:left;padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:var(--bg2);color:var(--text);font-size:13px;font-weight:600;font-family:var(--sans);line-height:1.3;}
.wl-opt.on{border-color:var(--accent);background:var(--accent-dim);}
.wl-opt-ck{color:var(--accent);flex-shrink:0;display:inline-flex;}
.wl-daypick{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.wl-day{padding:9px 0;border:1px solid var(--line);border-radius:9px;background:var(--bg2);color:var(--text);font-size:12px;font-weight:700;font-family:var(--sans);}
.wl-day.on{background:var(--accent);color:var(--on-accent);border-color:var(--accent);}
.wl-datebtn{background:none;border:none;color:var(--text);font-size:15px;font-weight:700;font-family:var(--sans);display:flex;align-items:center;justify-content:center;gap:4px;padding:6px 4px;min-width:0;}
.wl-daybar{margin-bottom:2px;}
.wl-daybar-row{display:flex;align-items:center;justify-content:center;gap:2px;}
.wl-daybar .wl-datebtn{flex:0 1 auto;font-size:14.5px;}
.wl-daybar.off .wl-datebtn{color:var(--accent);}
.wl-hnav-wrap{min-width:0;flex:1;display:flex;flex-direction:column;gap:3px;align-items:flex-start;}
.wl-brandrow{display:flex;align-items:center;gap:6px;}
.wl-mark{display:flex;line-height:0;flex:none;}
.wl-brandword{font-weight:900;letter-spacing:.2em;font-size:17px;color:var(--text);}
.wl-hnav{display:flex;align-items:center;gap:2px;min-width:0;}
.wl-hnav-arw{width:30px;height:30px;border-radius:7px;border:1px solid var(--line);background:var(--card);color:var(--muted);font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0;flex:none;}
.wl-hnav-lbl{display:flex;align-items:center;gap:7px;padding:4px 8px;border-radius:9px;background:none;border:none;color:var(--text);font-size:16px;font-weight:800;letter-spacing:-.01em;font-family:var(--sans);min-width:0;}
.wl-hnav-lbl>span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wl-hnav.off .wl-hnav-lbl{color:var(--text);}
.wl-hnav-lbl.month{min-width:122px;justify-content:center;}
.wl-hnav-arw.off{opacity:.35;}
.wl-hdr-datebar{padding:0 20px 12px;}
.wl-substat{margin-top:16px;}
.wl-substat-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.wl-substat-h>span{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.wl-substat-h .v{color:var(--text);text-transform:none;letter-spacing:0;}
.wl-syncdot{position:relative;flex:none;width:22px;height:22px;display:flex;align-items:center;justify-content:center;background:none;border:none;padding:0;cursor:pointer;}
.wl-sdot{width:7px;height:7px;border-radius:50%;background:var(--faint);}
.wl-sdot.good{background:var(--good);box-shadow:0 0 0 2px rgba(92,214,160,.18);}
.wl-sdot.warn{background:var(--accent);box-shadow:0 0 0 2px rgba(245,181,68,.18);}
.wl-sdot.bad{background:var(--bad);box-shadow:0 0 0 2px rgba(242,109,91,.18);}
.wl-statusban{display:flex;gap:12px;align-items:flex-start;width:100%;text-align:left;border-radius:13px;padding:13px 14px;margin-bottom:12px;border:1px solid;background:none;font-family:var(--sans);cursor:pointer;}
.wl-statusban.vac{background:linear-gradient(180deg,rgba(124,147,245,.13),rgba(124,147,245,.04));border-color:rgba(124,147,245,.4);}
.wl-statusban.sick{background:linear-gradient(180deg,rgba(159,176,201,.12),rgba(159,176,201,.03));border-color:rgba(159,176,201,.35);}
.wl-sb-em{font-size:20px;line-height:1;margin-top:1px;}
.wl-sb-t{flex:1;min-width:0;display:flex;flex-direction:column;}
.wl-sb-h{font-weight:800;font-size:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.wl-statusban.vac .wl-sb-h{color:#AEBEF9;}
.wl-statusban.sick .wl-sb-h{color:var(--steel);}
.wl-sb-pill{font-size:9px;font-weight:700;color:var(--faint);border:1px solid var(--line2);border-radius:20px;padding:1px 7px;}
.wl-sb-s{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.45;}
.wl-sb-edit{font-size:11px;color:var(--faint);font-weight:700;margin-top:8px;}
.wl-status-link{display:block;width:100%;text-align:center;background:none;border:1px dashed var(--line2);border-radius:11px;padding:10px;color:var(--muted);font-size:12px;font-weight:600;font-family:var(--sans);margin-bottom:12px;cursor:pointer;}
.wl-modebadge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:800;letter-spacing:.02em;padding:5px 12px;border-radius:20px;border:1px solid;background:none;font-family:var(--sans);cursor:pointer;line-height:1;}
.wl-modebadge.vac{color:#AEBEF9;border-color:rgba(124,147,245,.5);background:rgba(124,147,245,.14);}
.wl-modebadge.sick{color:var(--steel);border-color:rgba(159,176,201,.5);background:rgba(159,176,201,.12);}
.wl-hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:7px;}
.wl-hdr-icons{display:flex;align-items:center;gap:10px;}
.wl-modecard.vac{border-color:rgba(124,147,245,.5);background:linear-gradient(180deg,rgba(124,147,245,.1),transparent);}
.wl-modecard.sick{border-color:rgba(159,176,201,.45);background:linear-gradient(180deg,rgba(159,176,201,.09),transparent);}
.wl-modecard.vac .wl-card-head>span:first-child{color:#AEBEF9;}
.wl-modecard.sick .wl-card-head>span:first-child{color:var(--steel);}
.wl-modeon{font-size:9px;font-weight:800;letter-spacing:.08em;padding:2px 8px;border-radius:20px;background:var(--good);color:#04140c;}
.wl-daydot{width:6px;height:6px;border-radius:50%;background:var(--good);display:inline-block;margin-right:7px;}
.wl-jumptoday{background:var(--accent);color:#000;border:none;border-radius:20px;padding:5px 14px;font-weight:800;font-size:12px;font-family:var(--sans);cursor:pointer;}

function bmr(){var s=state.settings;

  var inch=num(s.heightIn)||0;var H=(ft*12+inch)*2.54;

var ACTIVITY={bmr:1,sedentary:1.2,light:1.375,moderate:1.4625,active:1.55,intense:1.725,physical:1.9};
var ALEVELS=[["bmr","Basal Metabolic Rate (BMR)"],["sedentary","Little or no exercise"],["light","Exercise 1–3 times/week"],["moderate","Exercise 4–5 times/week"],["active","Daily exercise or intense 3–4×/week"],["intense","Intense exercise 6–7 times/week"],["physical","Very intense daily, or physical job"]];

function prepChart(src){
  var sw=(src||state.weights).slice().sort(function(a,b){return a.date.localeCompare(b.date);});if(!sw.length)return {data:[],slope:null,intercept:null};
  var pts=sw.map(function(x){return {ts:parseISO(x.date).getTime(),weight:x.weight,date:x.date};});

  /* a regression needs real data behind it: 2 points always fit a line perfectly and report a

    var sxy=0,sxx=0;pts.forEach(function(p){sxy+=(p.ts-mx)*(p.weight-my);sxx+=(p.ts-mx)*(p.ts-mx);});
    if(sxx!==0){slope=sxy/sxx;intercept=my-slope*mx;}}

function computeForecasts(current,goal,slope){

  if(current<=goal)return {target:null,observed:null,done:true};
  var out={target:null,observed:null,done:false};

  if(tv&&tv>0){var weeks=null;
    if(state.settings.targetType==="percent_bw_per_week"){var p=tv/100;if(p>0&&p<1)weeks=Math.log(goal/current)/Math.log(1-p);}
    else weeks=(current-goal)/tv;

function buildChart(c,goal,unit,compact,rmin,rmax){
  var data=c.data;if(!data.length)return '<div class="wl-empty">No weigh-ins yet. Add your first one to see the chart.</div>';
  var W=340,H=compact?150:200,padL=34,padR=12,padT=14,padB=22;
  var ys=[];data.forEach(function(d){ys.push(d.weight);if(d.avg!=null)ys.push(d.avg);if(d.reg!=null)ys.push(d.reg);});
  if(goal!=null)ys.push(goal);
  var mn=Math.min.apply(null,ys),mx=Math.max.apply(null,ys);var padY=Math.max(1,(mx-mn)*0.14);
  var yMin=Math.floor(mn-padY),yMax=Math.ceil(mx+padY);if(yMin===yMax){yMax=yMin+2;}
  var xMin=(rmin!=null)?rmin:data[0].ts,xMax=(rmax!=null)?rmax:data[data.length-1].ts;if(xMin>data[0].ts)xMin=data[0].ts;if(xMax<data[data.length-1].ts)xMax=data[data.length-1].ts;if(xMin===xMax){xMin-=DAY;xMax+=DAY;}
  function sx(t){return padL+(t-xMin)/(xMax-xMin)*(W-padL-padR);}

  var s='<svg class="wl-chart" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" style="height:'+H+'px">';
  for(var i=0;i<=4;i++){var yv=yMin+(yMax-yMin)*i/4;var y=sy(yv);
    s+='<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="'+CH.grid+'" stroke-dasharray="2 4"/>';
    s+='<text x="'+(padL-5)+'" y="'+(y+3)+'" fill="'+CH.axis+'" font-size="9" text-anchor="end">'+Math.round(yv)+'</text>';}
  [[xMin,"start"],[(xMin+xMax)/2,"middle"],[xMax,"end"]].forEach(function(pr){
    s+='<text x="'+sx(pr[0])+'" y="'+(H-6)+'" fill="'+CH.axis+'" font-size="9" text-anchor="'+pr[1]+'">'+fmtShort(new Date(pr[0]))+'</text>';});
  if(goal!=null){var gy=sy(goal);s+='<line x1="'+padL+'" y1="'+gy+'" x2="'+(W-padR)+'" y2="'+gy+'" stroke="'+CH.goal+'" stroke-width="1.3" stroke-dasharray="5 4"/>';
    s+='<text x="'+(W-padR)+'" y="'+(gy-4)+'" fill="'+CH.goal+'" font-size="9" text-anchor="end">Goal '+r1(goal)+'</text>';}
  if(c.slope!=null){var r0=sy(c.slope*xMin+c.intercept),r1e=sy(c.slope*xMax+c.intercept);
    s+='<line x1="'+sx(xMin)+'" y1="'+r0+'" x2="'+sx(xMax)+'" y2="'+r1e+'" stroke="'+CH.reg+'" stroke-width="1.6" stroke-dasharray="6 5"/>';}
  var actual="",avg="";data.forEach(function(d,i){var X=sx(d.ts);actual+=(i?"L":"M")+X+" "+sy(d.weight)+" ";avg+=(i?"L":"M")+X+" "+sy(d.avg)+" ";});
  s+='<path d="'+avg+'" fill="none" stroke="'+CH.avg+'" stroke-width="2.4" stroke-linejoin="round"/>';
  s+='<path d="'+actual+'" fill="none" stroke="'+CH.actualLine+'" stroke-width="1.1"/>';
  data.forEach(function(d){s+='<circle data-act="chart:pt" data-ts="'+d.ts+'" data-w="'+d.weight+'" data-avg="'+d.avg+'" cx="'+sx(d.ts)+'" cy="'+sy(d.weight)+'" r="3.2" fill="'+CH.actual+'"/>';});
  s+='</svg>';
  var last=data[data.length-1];

  if(!compact)s+='<div class="wl-legend"><span><i style="background:'+CH.actual+'"></i>Actual</span><span><i style="background:'+CH.avg+'"></i>7-day avg</span>'+(c.slope!=null?'<span><i style="background:'+CH.reg+'"></i>Trend</span>':'')+'<span><i style="background:'+CH.goal+'"></i>Goal</span></div>';
  return s;
}

function renderSummary(t){var o=esc(t);o=o.replace(/\*\*(.+?)\*\*/g,"<b>$1</b>");o=o.replace(/^\s*[-*]\s+/gm,"• ");o=o.replace(/\n/g,"<br>");return o;}
function weeklyAIText(){
  var u=state.settings.units;
  var avg=function(a){return a.length?Math.round(a.reduce(function(x,y){return x+y;},0)/a.length):null;};
  function summ(off){var days=weekDays(off).map(dayRow);
    return {days:days,
      wv:days.map(function(d){return d.weight;}).filter(function(x){return x!=null;}),
      steps:days.map(function(d){return d.steps;}).filter(function(x){return x!=null;}),
      sleep:days.map(function(d){return d.sleep;}).filter(function(x){return x!=null;}),
      cals:days.map(function(d){return d.calories;}).filter(function(x){return x!=null;}),
      prot:days.map(function(d){return d.protein;}).filter(function(x){return x!=null;}),
      fat:days.map(function(d){return d.fat;}).filter(function(x){return x!=null;}),
      carb:days.map(function(d){return d.carbs;}).filter(function(x){return x!=null;})};}
  function acts(days){var a={};days.forEach(function(d){d.activities.forEach(function(x){a[x]=(a[x]||0)+1;});});return a;}
  function loggedCount(days){return days.filter(function(d){return d.weight!=null||d.steps!=null||d.sleep!=null||d.calories!=null||d.activities.length;}).length;}
  var t=summ(0),p=summ(-1);
  var s=weekStartFor(0),e=addDays(s,6);
  var curW=t.wv.length?t.wv[t.wv.length-1]:null;var wChange=t.wv.length>=2?(t.wv[t.wv.length-1]-t.wv[0]):null;
  var al=Object.keys(acts(t.days)).map(function(a){return a+" x"+acts(t.days)[a];});
  var L=[];
  L.push("Weekly check-in for "+(state.settings.name||"me")+" — "+fmtShort(s)+" to "+fmtShort(e)+". Units: "+u+".");
  L.push("Goals: target weight "+(num(state.settings.goalWeight)!=null?r1(num(state.settings.goalWeight))+" "+u:"not set")+"; steps "+(state.settings.stepsGoal||"not set")+"/day; sleep "+(sleepGoalMin()!=null?minToHM(sleepGoalMin()):"not set")+"; calories "+(num(state.settings.targetCalories)!=null?num(state.settings.targetCalories):"not set")+"/day.");
  L.push("Weight: "+(curW!=null?curW+" "+u:"not logged")+(wChange!=null?" ("+(wChange<=0?"down ":"up ")+Math.abs(r1(wChange))+" "+u+" over the week)":"")+". Weekly avg "+(avg(t.wv)!=null?avg(t.wv)+" "+u:"n/a")+" vs "+(avg(p.wv)!=null?avg(p.wv)+" "+u:"n/a")+" last week.");
  L.push("Steps: avg "+(avg(t.steps)!=null?avg(t.steps).toLocaleString():"none")+"/day vs "+(avg(p.steps)!=null?avg(p.steps).toLocaleString():"none")+" last week ("+t.steps.length+"/7 days logged).");
  L.push("Sleep: avg "+(avg(t.sleep)!=null?minToHM(avg(t.sleep)):"none")+"/night vs "+(avg(p.sleep)!=null?minToHM(avg(p.sleep)):"none")+" last week.");
  L.push("Calories: avg "+(avg(t.cals)!=null?avg(t.cals).toLocaleString():"none")+"/day; macros avg protein "+(avg(t.prot)!=null?avg(t.prot)+"g":"n/a")+", carbs "+(avg(t.carb)!=null?avg(t.carb)+"g":"n/a")+", fat "+(avg(t.fat)!=null?avg(t.fat)+"g":"n/a")+" ("+t.cals.length+"/7 days logged).");
  L.push("Activities: "+(al.length?al.join(", "):"none logged")+". Days logged: "+loggedCount(t.days)+"/7.");
  L.push("");
  L.push("Please give a short, encouraging but honest weekly check-in: what went well, one or two things to watch, and one concrete suggestion for next week. Keep it motivating and practical — no medical advice or diagnosis.");
  return L.join("\n");
}
function ckRow(done,label,val,sec,optional){
  var ic=done?'<span class="wl-ck-ic done"></span>':(optional?'<span class="wl-ck-ic opt">◦</span>':'<span class="wl-ck-ic miss">!</span>');
  return '<button class="wl-ck-row" data-act="dl:open" data-sec="'+sec+'"><span class="wl-ck-l">'+ic+'<span class="wl-ck-lab">'+label+'</span></span><span class="wl-ck-val'+(done?"":" empty")+'">'+esc(val)+'</span><span class="wl-ck-go">›</span></button>';
}
function ckCalories(sel){
  var f=state.food[sel]||{};var cal=num(f.calories),p=num(f.protein),cb=num(f.carbs),ft=num(f.fat);
  var has=cal!=null||p!=null||cb!=null||ft!=null;
  if(!has)return '<button class="wl-ck-row" data-act="dl:open" data-sec="calories"><span class="wl-ck-l"><span class="wl-ck-ic miss">!</span><span class="wl-ck-lab">Calories</span></span><span class="wl-ck-val empty">Add</span><span class="wl-ck-go">›</span></button>';
  var tg=num(state.settings.targetCalories);
  var tCarb=num(state.settings.targetCarbs),tFat=num(state.settings.targetFat),tProt=num(state.settings.targetProtein);
  var calOver=(tg!=null&&cal!=null&&cal>tg);
  var carbOver=calOver&&(tCarb!=null&&cb!=null&&cb>tCarb);
  var fatOver=calOver&&(tFat!=null&&ft!=null&&ft>tFat);
  var protLow=(tProt!=null&&p!=null&&p<tProt*0.9);
  var calWayOver=(tg!=null&&cal!=null&&cal>tg*1.15);
  var calStyle=calWayOver?' style="color:var(--bad)"':(calOver?' style="color:var(--accent)"':'');
  var h='<button class="wl-ck-row col" data-act="dl:open" data-sec="calories"><div class="wl-ck-top"><span class="wl-ck-l"><span class="wl-ck-ic done"></span><span class="wl-ck-lab">Calories</span></span><span class="wl-ck-val"'+calStyle+'>'+(cal!=null?Math.round(cal).toLocaleString():"—")+(tg!=null?' <span style="color:var(--faint);font-weight:600">/ '+tg.toLocaleString()+'</span>':'')+'</span><span class="wl-ck-go">›</span></div>';
  if(p!=null||cb!=null||ft!=null){var P=(p||0)*4,C=(cb||0)*4,F=(ft||0)*9;var tot=(P+C+F)||1;
    var pCol=protLow?"var(--bad)":"var(--mac-p)",cCol=carbOver?"var(--accent)":"var(--mac-c)",fCol=fatOver?"var(--accent)":"var(--mac-f)";
    h+='<div class="wl-mbar"><i style="width:'+(P/tot*100)+'%;background:'+pCol+'"></i><i style="width:'+(C/tot*100)+'%;background:'+cCol+'"></i><i style="width:'+(F/tot*100)+'%;background:'+fCol+'"></i></div>';
    h+='<div class="wl-mlegend"><div class="wl-mseg"><div class="k" style="color:'+pCol+'">Protein</div><div class="v"'+(protLow?' style="color:var(--bad)"':'')+'>'+(p!=null?p+"g":"—")+'</div></div><div class="wl-mseg"><div class="k" style="color:'+cCol+'">Carbs</div><div class="v"'+(carbOver?' style="color:var(--accent)"':'')+'>'+(cb!=null?cb+"g":"—")+'</div></div><div class="wl-mseg"><div class="k" style="color:'+fCol+'">Fat</div><div class="v"'+(fatOver?' style="color:var(--accent)"':'')+'>'+(ft!=null?ft+"g":"—")+'</div></div></div>';}
  return h+'</button>';
}
function ckNotes(sel){
  var note=(state.notes[sel]||"").trim();
  if(note){var snip=note.length>58?note.slice(0,58)+"…":note;
    return '<button class="wl-ck-row" data-act="dl:open" data-sec="notes"><span class="wl-ck-l"><span class="wl-ck-ic done"></span><span class="wl-ck-lab">Notes</span></span><span class="wl-ck-note">'+esc(snip)+'</span><span class="wl-ck-go">›</span></button>';}

function idb(){return new Promise(function(res,rej){
  if(photoDB)return res(photoDB);
  if(typeof indexedDB==="undefined")return rej("no idb");
  function mkStore(db){if(!db.objectStoreNames.contains("photos")){var os=db.createObjectStore("photos",{keyPath:"id"});os.createIndex("date","date",{unique:false});}}

     wl_photos database stuck at version 1 with no object store (an older build
     opened it without an upgrade handler and created it empty) — opening at
     version 1 again would succeed with no upgrade event and leave it broken
     forever. Detect that and bump the version, which is the only way to obtain an
     upgrade transaction in which the store can be added. Self-heals; a healthy
     database takes the fast path and never bumps. */
  var r=indexedDB.open("wl_photos");
  r.onupgradeneeded=function(){mkStore(r.result);};
  r.onsuccess=function(){var db=r.result;
    if(db.objectStoreNames.contains("photos")){photoDB=db;res(db);return;}
    var v=db.version+1;db.close();
    var r2=indexedDB.open("wl_photos",v);
    r2.onupgradeneeded=function(){mkStore(r2.result);};
    r2.onsuccess=function(){photoDB=r2.result;res(photoDB);};
    r2.onerror=function(){rej(r2.error);};};
  r.onerror=function(){rej(r.error);};});}

       cb&&cb(false,(e==="auth")?"auth":(e==="error")?"error":"offline");});}

/* ---- drop-in replacements for the GitHub primitives ----
   Same callback contracts, so cloudPull/autoSync/the status dot are untouched. */
function cloudGet(cb){
  pbGetRecord(function(rec,err){
    if(err){cb&&cb(null,err);return;}
    cb&&cb((rec&&rec.data)||{},null);});}

function cloudPush(manual){
  if(!syncOn()){if(manual)toast("Log in first");return;}
  if(pushing){clearTimeout(pushTimer);pushTimer=setTimeout(function(){cloudPush(manual);},900);return;}
  pushing=true;setSync("saving");resyncAllActivityTags();
  pbSave({data:payload()},function(ok,err){
    pushing=false;
    if(ok){markDirty(false);setLastSync();setSync("ok");if(manual)toast("Saved to your server");return;}
    setSync(err==="offline"?"offline":"error",err==="auth"?"session expired — log in again":"");
    if(manual)toast(err==="offline"?"No connection":err==="auth"?"Please log in again":"Save failed");});}

function trainingPush(){
  if(!syncOn())return;
  pbSave({training:state.training},function(){});}

function trainingPull(cb){
  if(!syncOn()){cb&&cb();return;}
  pbGetRecord(function(rec){
    var d=rec&&rec.training;
    if(d&&typeof d==="object"&&(d.exercises||d.routines||d.sessions||d.liftSessions)){
      state.training={cardioTypes:(Array.isArray(d.cardioTypes)&&d.cardioTypes.length)?d.cardioTypes:state.training.cardioTypes,
        sessions:d.sessions||{},exercises:d.exercises||[],routines:d.routines||[],liftSessions:d.liftSessions||{}};
      saveTrainingLocal();}
    cb&&cb();});}

function cloudTest(){
  setSync("syncing");

    if(err){setSync(err==="offline"?"offline":"error",err==="auth"?"session expired":"");
      toast(err==="offline"?"No connection":err==="auth"?"Please log in again":"Failed");return;}
    var n=(d.weights||[]).length,fd=Object.keys(d.food||{}).length;

/* ---- Apple Health bridge ----
   A PWA cannot read HealthKit at all, so the iOS Shortcut stays the only path.
   What changes is the drop box: the Shortcut used to PUT health.json into the
   GitHub repo and the app polled that file. Now the Shortcut PATCHes the health
   field on this user's appdata record and the app polls the record. The polling
   contract (state.hkWait, 6 tries, 2s apart, 5-minute ceiling) is unchanged. */
function hkTryFetch(){
  var w=state.hkWait;if(!w)return;
  if(Date.now()-w.ts>5*60*1000){state.hkWait=null;render();return;}
  if(!syncOn())return;
  pbGetRecord(function(rec,err){
    var w2=state.hkWait;if(!w2)return;
    var h=(!err&&rec&&rec.health)||null;
    /* Shortcuts makes it easy to send a JSON *string* (a Text field in the request
       body) and hard to send a real nested object. Accept either — parsing here is
       far kinder than making someone build a nested dictionary in the Shortcuts UI. */
    if(typeof h==="string"){try{h=JSON.parse(h);}catch(e){h=null;}}
    /* Shortcuts can leave a trailing newline or space around an inserted variable,
       which is invisible on screen but would make the date fail to match and the
       import look broken for no visible reason. Compare on the trimmed value. */
    if(h&&h.date!=null)h.date=String(h.date).trim();
    if(!h||h.date!==w2.date){
      w2.tries=(w2.tries||0)+1;
      if(w2.tries<6){setTimeout(hkTryFetch,2000);}
      else{state.hkWait=null;toast("No Health data found yet — run the shortcut and try again");render();}
      return;}
    var d=h.date,got=0;
    /* Shortcuts can hand back a display-formatted number, and the app's num() uses
       parseFloat — so "8,016" would silently become 8 steps. Strip anything that
       isn't part of the number first: separators, unit suffixes ("34.25 in"), spaces.
       An empty string (Health had no sample for that type) becomes null, which is
       what lets every value be safely quoted in the Shortcut's JSON. */
    function hnum(v){
      if(v==null)return null;
      var s=String(v).replace(/[^0-9.\-]/g,"");
      if(!s||s==="."||s==="-")return null;
      var n=parseFloat(s);return isFinite(n)?n:null;}
    /* Only positive values count as data. Health returns 0 for "no samples today",
       and a 0 lb weigh-in or 0% body fat would be worse than importing nothing. */
    function val(k){var v=hnum(h[k]);return (v!=null&&v>0)?v:null;}
    var r1=function(v){return Math.round(v*10)/10;};

    /* macros live on the day's food entry, stored as strings like the app's own inputs */
    var fo=Object.assign({},state.food[d]||{});
    ["calories","protein","carbs","fat"].forEach(function(k){
      var v=val(k);if(v!=null){fo[k]=String(Math.round(v));got++;}});
    /* An imported calorie total is an explicit value, same as typing one — without
       this the calAuto flag recomputes 4/4/9 from the macros and overrides it
       (Health said 1804, macro math said 1866: fiber and rounding differ). */
    if(val("calories")!=null){fo.calAuto=false;delete fo.calDismiss;}
    state.food[d]=fo;

    /* weight is an ARRAY, not a per-day map — replace the day's entry, don't append a second */
    var w=val("weight");
    if(w!=null){
      state.weights=state.weights.filter(function(x){return x.date!==d;});
      state.weights.push({date:d,weight:r1(w)});
      try{setSkip(d,"weight",false);}catch(e){}
      got++;}

    /* per-day numeric maps. Body fat can arrive as a fraction (0.229) or a percent
       (22.9) depending on how it is read — normalise, since nobody is 0.2% body fat. */
    var bf=val("bodyfat");
    if(bf!=null&&bf<=1)bf=bf*100;
    [["steps",state.steps,val("steps"),0],
     ["sleep",state.sleep,(val("sleep")!=null?val("sleep"):(val("sleepHours")!=null?val("sleepHours")*60:null)),0],
     ["bodyfat",state.bodyfat,bf,1],
     ["waist",state.waist,val("waist"),1]].forEach(function(t){
      var v=t[2];if(v==null)return;
      t[1][d]=t[3]?r1(v):Math.round(v);
      try{setSkip(d,t[0],false);}catch(e){}
      got++;});

    state.hkDone={date:d,ts:Date.now()};state.hkWait=null;
    save();toast(got?("Imported "+got+" value"+(got===1?"":"s")+" from Health"):"Nothing to import for that day");render();});}

function pbRenderLogin(){
  document.getElementById("app").innerHTML=pbLoginHTML()+confirmOverlayHTML();
  var f=document.getElementById("wl-loginform");
  if(f)f.addEventListener("submit",function(e){e.preventDefault();pbDoLogin();});
  var em=document.getElementById("wl-pb-email");
  if(em&&!em.value)em.focus();}

function pbDoLogin(){
  if(pbLoginState.busy)return;
  var em=(document.getElementById("wl-pb-email")||{}).value||"";
  var pw=(document.getElementById("wl-pb-pass")||{}).value||"";
  var bs=(document.getElementById("wl-pb-base")||{}).value||"";
  var rmEl=document.getElementById("wl-pb-remember");
  var remember=rmEl?!!rmEl.checked:true;
  pbLoginState.remember=remember;
  em=em.trim();
  if(!em||!pw){pbLoginState.err="Enter your email and password.";pbRenderLogin();return;}
  if(bs){var c=pbCfg();c.base=bs.trim();setPbCfg(c);}
  pbLoginState.busy=true;pbLoginState.err="";pbRenderLogin();
  pbLogin(em,pw,function(ok,why){
    pbLoginState.busy=false;
    if(!ok){
      pbLoginState.err=(why==="bad")?"That email and password don’t match.":(why==="offline")?"Can’t reach the server. Is Tailscale on?":"Something went wrong. Try again.";
      pbRenderLogin();return;}
    pbLoginState.err="";
    setSync("syncing");
    cloudGet(function(d,err){
      function finish(){
        trainingPull(function(){
          setLastSync();setSync("ok");render();
          toast("Welcome back"+(state.settings.name?(", "+state.settings.name):""));
          /* pull this account's photos down onto this device in the background */
          photoSync(function(r){
            if(r&&r.downloaded)toast(r.downloaded+" photo"+(r.downloaded===1?"":"s")+" restored");});});}
      /* Normally the server is the truth on login. A device holding unsynced
         changes is only worth asking about when its data is at least as RECENT as
         the server's — a stale cache (an old Safari visit, a long-dormant device)
         must never be offered as something to upload. That path already destroyed
         the server copy once: months-old Safari storage + "Upload mine" as the
         primary button = the iPad stale-push disaster, reproduced. Recency check
         first, and the safe choice is the primary one. */
      function newestDate(w){var m="";(w||[]).forEach(function(x){if(x.date>m)m=x.date;});return m;}
      var localNewer=newestDate(state.weights)>newestDate(d&&d.weights);
      if(!err&&d&&isDirty()&&localHasData()&&!cloudEmpty(d)&&localNewer){
        askConfirm("This device has newer entries that were never saved to the server. Keep the server’s copy, or upload this device’s?",
          function(){applyCloud(d);finish();},
          {label:"Use server copy",danger:false,onNo:function(){cloudPush(false);finish();}});
        return;}
      if(!err&&d)applyCloud(d);
      finish();});},remember);}

/* gate the whole app behind login without duplicating render()'s body */

/* The app's confirm dialog only calls back on YES; "No" just closes. For a genuine
   two-way choice we need the No branch too, so wrap askConfirm and remember the
   handler ourselves — the app's own listener nulls state.pendingConfirm before our
   listener runs, so we can't read it from there.
   ⚠️ Assignment, not a function-declaration override — a hoisted declaration would
   capture itself on the line above and recurse forever. */
var _pbAskConfirm=askConfirm,pbOnNo=null;
askConfirm=function(msg,fn,opts){pbOnNo=(opts&&opts.onNo)||null;return _pbAskConfirm(msg,fn,opts);};

/* extra acts (the original listener ignores acts it doesn't know) */
document.addEventListener("click",function(e){

});

/* ============================================================
   PHOTOS — server-backed sync on top of the existing IndexedDB store.
   IndexedDB stays the local cache so every existing photo view keeps
   working untouched; PocketBase becomes the backbone that makes photos
   appear on any device you log into.
   ============================================================ */
var PB_PMAP="wl_photomap";
function pbPhotoMap(){try{return JSON.parse(localStorage.getItem(PB_PMAP))||{};}catch(e){return {};}}
function setPbPhotoMap(m){try{localStorage.setItem(PB_PMAP,JSON.stringify(m));}catch(e){}}

/* protected files need a short-lived token — an unguessable URL is not enough */
function pbFileToken(){
  return fetch(pbBase()+"/api/files/token",{method:"POST",headers:pbHeaders(true)})
    .then(function(r){return r.ok?r.json():Promise.reject(r.status);})
    .then(function(j){return j.token;});}

function pbPhotoList(){
  return fetch(pbBase()+"/api/collections/photos/records?perPage=500&filter="
      +encodeURIComponent('user="'+pbUid()+'"')+"&t="+Date.now(),{headers:pbHeaders(),cache:"no-store"})
    .then(function(r){return r.ok?r.json():Promise.reject(r.status);})
    .then(function(p){return p.items||[];});}

function pbPhotoUpload(rec){
  var fd=new FormData();
  var type=(rec.blob&&rec.blob.type)||"image/jpeg";
  var ext=({"image/png":"png","image/webp":"webp","image/heic":"heic"})[type]||"jpg";
  fd.append("user",pbUid());
  fd.append("kind",rec.kind==="progress"?"progress":"food");
  fd.append("date",String(rec.date||"").slice(0,10));
  if(rec.week)fd.append("week",String(rec.week).slice(0,10));
  if(rec.pose)fd.append("pose",String(rec.pose).slice(0,20));
  /* food photos carry their meal label — dropping it strips the diary's grouping */
  if(rec.meal)fd.append("meal",String(rec.meal).slice(0,20));
  fd.append("localId",String(rec.id));
  fd.append("ts",String(rec.ts||Date.now()));
  fd.append("file",rec.blob,(rec.pose||rec.kind||"photo")+"."+ext);
  var h={};var t=pbTok();if(t)h.Authorization=t; /* no Content-Type — the browser sets the multipart boundary */
  return fetch(pbBase()+"/api/collections/photos/records",{method:"POST",headers:h,body:fd})
    .then(function(r){return r.ok?r.json():Promise.reject(r.status);});}

function pbPhotoDelete(serverId){
  return fetch(pbBase()+"/api/collections/photos/records/"+serverId,{method:"DELETE",headers:pbHeaders()})
    .then(function(r){return (r.ok||r.status===404)?true:Promise.reject(r.status);});}

function pbPhotoFetchBlob(srec,token){
  return fetch(pbBase()+"/api/files/photos/"+srec.id+"/"+srec.file+"?token="+encodeURIComponent(token))
    .then(function(r){return r.ok?r.blob():Promise.reject(r.status);});}

/* ---- the sync itself ---- */
var pbPhotoSyncing=false;
function photoSync(done){
  if(!syncOn()||pbPhotoSyncing||typeof indexedDB==="undefined"){done&&done();return;}
  pbPhotoSyncing=true;
  var uploaded=0,downloaded=0,removed=0;
  /* mapStart is the set of photos we KNEW were on the server before this run.
     Deletion-propagation must test against this snapshot, not the live map —
     otherwise a photo uploaded moments ago (absent from the server listing we
     already fetched) would look like a remote deletion and be wiped locally. */
  var mapStart=pbPhotoMap(),map=pbPhotoMap();

  function finish(){
    setPbPhotoMap(map);pbPhotoSyncing=false;
    if(uploaded||downloaded||removed){
      try{wkPhotoKey=null;refreshWeekPhotos();}catch(e){}
      if(state.view==="photos"||state.view==="diary")render();}
    done&&done({uploaded:uploaded,downloaded:downloaded,removed:removed});}

  Promise.all([idbAll(),pbPhotoList()]).then(function(res){
    var local=res[0]||[],server=res[1]||[];
    var byLocalId={};server.forEach(function(s){if(s.localId)byLocalId[s.localId]=s;});
    var localIds={};local.forEach(function(l){localIds[l.id]=l;});

    /* 1. push anything this device has that the server doesn't.
          The UNIQUE (user, localId) index makes a re-run harmless. */
    var ups=local.filter(function(l){return l.blob&&!byLocalId[l.id];}).map(function(l){
      return pbPhotoUpload(l).then(function(s){map[l.id]=s.id;uploaded++;})
        .catch(function(){/* one bad photo must not abort the whole sweep */});});

    return Promise.all(ups)
      .then(function(){
        /* 2. pull anything the server has that this device doesn't */
        var missing=server.filter(function(s){return s.localId&&!localIds[s.localId];});
        if(!missing.length)return null;
        return pbFileToken().then(function(tok){
          return Promise.all(missing.map(function(s){
            return pbPhotoFetchBlob(s,tok).then(function(b){
              map[s.localId]=s.id;downloaded++;
              /* idbAddLocal, not idbAdd — this came FROM the server, re-uploading it
                 would just bounce off the unique index and waste a round trip */
              var nrec={id:s.localId,date:s.date,week:s.week||s.date,pose:s.pose||"",
                kind:s.kind||"progress",blob:b,ts:s.ts||Date.now()};
              if(s.meal)nrec.meal=s.meal;
              return idbAddLocal(nrec);
            }).catch(function(){});}));});})
      .then(function(){
        /* 2b. metadata repair — for photos BOTH sides have, reconcile the meal label.
           Server label wins when it has one (a device that downloaded before the
           label existed gets repaired); a device holding a label the server lacks
           pushes it up. Blobs are never re-transferred for this. */
        var fixes=[];
        local.forEach(function(l){
          var s=byLocalId[l.id];if(!s)return;
          if(s.meal&&(l.meal||"")!==s.meal){
            var patched=Object.assign({},l,{meal:s.meal});
            fixes.push(idbAddLocal(patched).then(function(){downloaded++;}).catch(function(){}));
          }else if(l.meal&&!s.meal){
            fixes.push(fetch(pbBase()+"/api/collections/photos/records/"+s.id,{method:"PATCH",
              headers:pbHeaders(true),body:JSON.stringify({meal:l.meal})}).catch(function(){}));
          }});
        return Promise.all(fixes);})
      .then(function(){
        /* 3. propagate deletions: a photo we previously synced, now absent from the
              server, was deleted on another device — mirror that deletion here. */
        var gone=local.filter(function(l){return mapStart[l.id]&&!byLocalId[l.id];});
        return Promise.all(gone.map(function(l){
          delete map[l.id];removed++;
          return idbDeleteLocal(l.id).catch(function(){});}));})
      .then(finish);
  }).catch(function(){pbPhotoSyncing=false;done&&done();});
}

/* Keep the original local-only ops, then make the public ones sync through.
   ⚠️ These MUST be assignments, NOT function-declaration overrides. Declarations
   hoist, so a declared override would already own the name by the time this line ran
   and idbAddLocal would capture the override itself — infinite recursion. Same
   wrap-don't-redeclare pattern as the render() gate above. */
var idbAddLocal=idbAdd,idbDeleteLocal=idbDelete,idbClearAllLocal=idbClearAll;

idbAdd=function(rec){
  return idbAddLocal(rec).then(function(r){
    if(syncOn()&&rec.blob){
      pbPhotoUpload(rec).then(function(s){var m=pbPhotoMap();m[rec.id]=s.id;setPbPhotoMap(m);})
        .catch(function(){/* stays local; the next photoSync() retries it */});}
    return r;});};

idbDelete=function(id){
  var m=pbPhotoMap(),sid=m[id];
  if(syncOn()&&sid){pbPhotoDelete(sid).then(function(){var mm=pbPhotoMap();delete mm[id];setPbPhotoMap(mm);}).catch(function(){});}
  return idbDeleteLocal(id);};

idbClearAll=function(){
  if(syncOn()){
    pbPhotoList().then(function(list){
      return Promise.all(list.map(function(s){return pbPhotoDelete(s.id).catch(function(){});}));
    }).then(function(){setPbPhotoMap({});}).catch(function(){});}
  return idbClearAllLocal();};

/* ---- lightbox with "Edit meal type" ----
   Full replacement of the app's openLightbox: identical navigation, delete, swipe
   and close-rerender behavior, plus — for FOOD photos only — an "Edit meal type"
   button in the bar. Tapping it reveals the four meal options; tapping one
   reassigns immediately (no confirm — it's fully reversible), collapses the row,
   and the diary regroups on close. Chips are hidden behind the button on purpose:
   always-visible chips invite accidental taps. */
function openLightbox(id){
  var ids=[].slice.call(document.querySelectorAll('[data-act="photo:view"]')).map(function(b){return b.getAttribute("data-id");});
  if(ids.indexOf(id)<0)ids=[id];
  var MEALS=[["breakfast","Breakfast"],["lunch","Lunch"],["snack","Snack"],["dinner","Dinner"]];
  var ov=document.createElement("div");ov.className="wl-lightbox";
  ov.innerHTML='<div class="wl-lb-count"></div><button class="wl-lb-nav prev" data-lb="prev">‹</button><img class="wl-lb-img" alt=""><button class="wl-lb-nav next" data-lb="next">›</button>'+
    '<div class="wl-lb-meals" style="display:none"></div>'+
    '<div class="wl-lb-bar"><button class="wl-btn wl-btn-ghost" data-lb="close">Close</button><button class="wl-btn wl-btn-ghost" data-lb="mealedit" style="display:none">Edit</button><button class="wl-btn wl-btn-danger" data-lb="del">Delete</button></div>';
  var img=ov.querySelector(".wl-lb-img"),countEl=ov.querySelector(".wl-lb-count"),prevB=ov.querySelector(".wl-lb-nav.prev"),nextB=ov.querySelector(".wl-lb-nav.next");
  var mealsRow=ov.querySelector(".wl-lb-meals"),mealBtn=ov.querySelector('[data-lb="mealedit"]');
  var urls={},recs={},idx=Math.max(0,ids.indexOf(id)),dirty=false;
  function curRec(){return recs[ids[idx]]||null;}
  function isFood(r){return !!r&&r.kind!=="progress";}
  function renderMeals(){
    var r=curRec();if(!r){mealsRow.style.display="none";return;}
    mealsRow.innerHTML=MEALS.map(function(m){
      return '<button class="wl-lb-mealchip'+((r.meal||"")===m[0]?" on":"")+'" data-lb="meal" data-meal="'+m[0]+'">'+m[1]+'</button>';}).join("");}
  function show(){
    img.src=urls[ids[idx]]||"";countEl.textContent=ids.length>1?(idx+1)+" / "+ids.length:"";
    prevB.style.visibility=idx>0?"visible":"hidden";nextB.style.visibility=idx<ids.length-1?"visible":"hidden";
    var food=isFood(curRec());
    mealBtn.style.display=food?"":"none";
    mealsRow.style.display="none"; /* collapse when navigating between photos */
  }
  function go(d){var ni=idx+d;if(ni<0||ni>=ids.length)return;idx=ni;show();}
  function close(){document.removeEventListener("keydown",key);Object.keys(urls).forEach(function(k){try{URL.revokeObjectURL(urls[k]);}catch(e){}});if(ov.parentNode)document.body.removeChild(ov);if(dirty){if(state.view==="diary")renderDiary();
    if(state.view==="photos")renderProgressPhotos();else renderPhotosStrip(state.selDate);}}
  function key(e){if(e.key==="ArrowLeft")go(-1);else if(e.key==="ArrowRight")go(1);else if(e.key==="Escape")close();}
  document.addEventListener("keydown",key);
  ov.addEventListener("click",function(e){var b=e.target.closest("[data-lb]");
  if(!b){if(e.target===ov)close();return;}
  var act=b.getAttribute("data-lb");
  if(act==="close")close();
  else if(act==="prev")go(-1);
  else if(act==="next")go(1);
  else if(act==="mealedit"){
    if(mealsRow.style.display==="none"){renderMeals();mealsRow.style.display="";}
    else mealsRow.style.display="none";}
  else if(act==="meal"){
    var r=curRec();if(!r)return;
    var m=b.getAttribute("data-meal");
    if((r.meal||"")===m){mealsRow.style.display="none";return;}
    r.meal=m;
    idbAddLocal(r).then(function(){
      dirty=true;
      var label="";MEALS.forEach(function(x){if(x[0]===m)label=x[1];});
      toast("Moved to "+label);
      renderMeals();
      setTimeout(function(){mealsRow.style.display="none";},350);
      /* mirror to the server; if unreachable, the photo-sync up-sync pass
         pushes the label the next time it runs */
      var sid=pbPhotoMap()[r.id];
      if(syncOn()&&sid){
        fetch(pbBase()+"/api/collections/photos/records/"+sid,{method:"PATCH",
          headers:pbHeaders(true),body:JSON.stringify({meal:m})}).catch(function(){});}
    }).catch(function(){toast("Couldn’t move the photo");});}
  else if(act==="del"){var pid=ids[idx];askConfirm("Delete this photo?",function(){idbDelete(pid).then(function(){dirty=true;try{URL.revokeObjectURL(urls[pid]);}catch(e){}delete urls[pid];ids.splice(idx,1);if(!ids.length){close();return;}if(idx>=ids.length)idx=ids.length-1;show();});});}});
  var sx=0,sy=0;
  ov.addEventListener("touchstart",function(e){if(!e.touches.length)return;sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
  ov.addEventListener("touchend",function(e){if(!e.changedTouches||!e.changedTouches.length)return;var dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(Math.abs(dx)>45&&Math.abs(dx)>Math.abs(dy)+10){if(dx<0)go(1);else go(-1);}},{passive:true});
  document.body.appendChild(ov);
  idbAll().then(function(all){var map={};all.forEach(function(p){map[p.id]=p.blob;recs[p.id]=p;});ids=ids.filter(function(i){return map[i];});idx=Math.max(0,ids.indexOf(id));ids.forEach(function(i){urls[i]=URL.createObjectURL(map[i]);});if(!ids.length){close();return;}show();}).catch(function(){});
}

/* ---------------- pull-to-refresh ---------------- */
(function(){
  var startY=0,pulling=false,dist=0,THRESH=64,ind=null;
  function scrollTop(){return window.scrollY||document.documentElement.scrollTop||0;}
  function el(){if(!ind){ind=document.createElement("div");ind.className="wl-ptr";ind.innerHTML='<div class="wl-ptr-ring"></div>';document.body.appendChild(ind);}return ind;}
  function move(px,dragging){var e=el();e.style.transition=dragging?"none":"transform .25s ease,opacity .25s ease";e.style.transform="translateX(-50%) translateY("+px+"px)";e.style.opacity=String(Math.min(1,px/40));if(px>=THRESH)e.classList.add("ready");else e.classList.remove("ready");}
  document.addEventListener("touchstart",function(e){
    pulling=false;
    if(!syncOn()||scrollTop()>0)return;
    if(e.target.closest&&e.target.closest("input,textarea,select"))return;
    startY=e.touches[0].clientY;pulling=true;dist=0;
  },{passive:true});
  document.addEventListener("touchmove",function(e){
    if(!pulling)return;
    if(scrollTop()>0){pulling=false;move(0,false);return;}
    dist=e.touches[0].clientY-startY;
    if(dist<=0){move(0,true);return;}
    if(dist>8)e.preventDefault();
    move(Math.min(dist*0.5,84),true);
  },{passive:false});
  document.addEventListener("touchend",function(){
    if(!pulling)return;pulling=false;
    if(dist*0.5>=THRESH){var e=el();e.classList.add("spin");e.classList.remove("ready");e.style.transition="transform .2s ease";e.style.transform="translateX(-50%) translateY(48px)";e.style.opacity="1";
      cloudPull(true,function(){setTimeout(function(){e.classList.remove("spin");move(0,false);},350);});}
    else move(0,false);
    dist=0;
  });
})();
